<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=780">
<title>Tap The Box Game</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: #111;
  color: #fff;
}

h1 {
  margin-top: 20px;
}

#gameArea {
  width: 100%;
  max-width: 400px;
  height: 400px;
  margin: 20px auto;
  position: relative;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
}

#box {
  width: 50px;
  height: 50px;
  position: absolute;
  border-radius: 8px;
  cursor: pointer;
  background: red;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🎯 Tap The Box</h1>
<p>Score: <span id="score">0</span></p>
<p>Time: <span id="time">30</span>s</p>
<button onclick="startGame()">Start Game</button>

<div id="gameArea">
  <div id="box"></div>
</div>

<script>
let score = 0;
let time = 30;
let gameInterval, moveInterval;

const box = document.getElementById("box");
const gameArea = document.getElementById("gameArea");

function randomPosition() {
  const maxX = gameArea.clientWidth - 50;
  const maxY = gameArea.clientHeight - 50;
  const x = Math.random() * maxX;
  const y = Math.random() * maxY;
  box.style.left = x + "px";
  box.style.top = y + "px";
}

function randomColor() {
  const colors = ["red", "blue", "green", "yellow", "orange", "pink"];
  box.style.background = colors[Math.floor(Math.random() * colors.length)];
}

box.onclick = () => {
  score++;
  document.getElementById("score").innerText = score;
  randomPosition();
  randomColor();
};

function startGame() {
  score = 0;
  time = 30;
  document.getElementById("score").innerText = score;
  document.getElementById("time").innerText = time;

  randomPosition();

  moveInterval = setInterval(() => {
    randomPosition();
    randomColor();
  }, 800);

  gameInterval = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if (time <= 0) {
      clearInterval(gameInterval);
      clearInterval(moveInterval);
      alert("Game Over! Your score: " + score);
    }
  }, 1000);
}
</script>

</body>
</html>
